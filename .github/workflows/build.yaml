name: Build & Push Image

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "k8s/**"
      - "secrets/**"
      - "workspace/**"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pi_version:
        description: "pi coding agent version override"
        required: false
      node_version:
        description: "Node.js version override"
        required: false
      go_version:
        description: "Go version override"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{branch}}-{{sha}},enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build args
        id: args
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.pi_version }}" ]; then
            ARGS="$ARGS\nPI_VERSION=${{ github.event.inputs.pi_version }}"
          fi
          if [ -n "${{ github.event.inputs.node_version }}" ]; then
            ARGS="$ARGS\nNODE_VERSION=${{ github.event.inputs.node_version }}"
          fi
          if [ -n "${{ github.event.inputs.go_version }}" ]; then
            ARGS="$ARGS\nGO_VERSION=${{ github.event.inputs.go_version }}"
          fi
          echo "build_args<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$ARGS" | tail -n +1 >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ steps.args.outputs.build_args }}
          platforms: linux/amd64