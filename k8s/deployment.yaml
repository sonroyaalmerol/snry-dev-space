apiVersion: apps/v1
kind: Deployment
metadata:
  name: snry-dev-space
  namespace: snry
  labels:
    app.kubernetes.io/name: snry-dev-space
    app.kubernetes.io/part-of: snry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snry-dev-space
  template:
    metadata:
      labels:
        app: snry-dev-space
    spec:
      containers:
        - name: snry
          image: ghcr.io/sonroyaalmerol/snry-dev-space:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 22
              name: ssh
          envFrom:
            - configMapRef:
                name: snry-tools
          env:
            - name: PI_CODING_AGENT_DIR
              value: /home/snry/.pi/agent
            - name: TERM
              value: xterm-256color
          volumeMounts:
            - name: pi-home
              mountPath: /home/snry/.pi
            - name: auth
              mountPath: /home/snry/.pi/agent/auth.json
              subPath: auth.json
              readOnly: true
            - name: ssh-key
              mountPath: /home/snry/.ssh/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: workspace
              mountPath: /home/snry/workspace
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            exec:
              command: ["pgrep", "sshd"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pgrep", "sshd"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: pi-home
          persistentVolumeClaim:
            claimName: snry-pi-home
        - name: auth
          secret:
            secretName: snry-auth
        - name: ssh-key
          secret:
            secretName: snry-ssh-key
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: snry-ssh
  namespace: snry
  labels:
    app.kubernetes.io/name: snry-dev-space
spec:
  type: LoadBalancer
  selector:
    app: snry-dev-space
  ports:
    - port: 22
      targetPort: ssh
      name: ssh